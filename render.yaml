services:
  - type: web
    name: moneyprint-render-worker
    runtime: docker
    dockerfilePath: ./services/worker/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: videos
      - key: WORKER_ID
        value: render-worker-001
      - key: WORKER_SHARED_SECRET
        sync: false
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: MONEYPRINT_VIDEO_SOURCE
        value: pexels

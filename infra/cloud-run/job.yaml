apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: moneyprint-worker
spec:
  template:
    spec:
      taskCount: 1
      template:
        spec:
          maxRetries: 0
          timeoutSeconds: 3600
          containers:
            - image: REGION-docker.pkg.dev/PROJECT_ID/moneyprint/worker:latest
              resources:
                limits:
                  cpu: "2"
                  memory: "4Gi"
              env:
                - name: SUPABASE_URL
                  value: "https://YOUR_PROJECT.supabase.co"
                - name: SUPABASE_SERVICE_ROLE_KEY
                  value: "YOUR_SUPABASE_SERVICE_ROLE_KEY"
                - name: SUPABASE_STORAGE_BUCKET
                  value: "videos"
                - name: WORKER_ID
                  value: "cloud-run-worker-001"
                - name: OPENAI_API_KEY
                  value: "YOUR_OPENAI_API_KEY"
                - name: PEXELS_API_KEY
                  value: "YOUR_PEXELS_API_KEY"
                - name: PIXABAY_API_KEY
                  value: ""
                - name: MONEYPRINT_VIDEO_SOURCE
                  value: "pexels"
